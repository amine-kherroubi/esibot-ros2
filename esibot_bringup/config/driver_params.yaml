# driver_params.yaml — open-loop version (no encoders)
# serial_port changed to /dev/ttyAMA0 (Pi GPIO UART, Pin8/Pin10)
# Before using: disable Pi serial console via raspi-config → Interface Options → Serial Port

esibot_driver:
  ros__parameters:
    serial_port:  '/dev/ttyS0'   # GPIO UART (Pi Pin8 TX → ESP32 GPIO3, Pin10 RX → ESP32 GPIO1)
    baud_rate:    115200
    odom_frame:   'odom'
    base_frame:   'base_footprint'
    publish_rate: 20.0