vision_node:
  ros__parameters:
    # -- Image --------------------------------------------------------------
    image_width: 320
    image_height: 240

    # -- ESP32-CAM source (direct MJPEG, no camera node) -------------------
    esp32_ip: "192.168.1.80"   # overridden via launch arg esp32_ip:=
    esp32_port: 80
    stream_path: "/stream"
    reconnect_delay: 3.0        # seconds between reconnect attempts
    jpeg_quality: 80            # annotated stream JPEG quality (1-100)

    # -- Lane detection (OpenCV) -------------------------------------------
    lane_roi_ratio: 1.0 # full image
    lane_threshold: 60 # binarization threshold (dark pixels < threshold)
    lane_min_area: 200 # minimum contour area to accept a line

    # -- Sign detection (YOLOv8n GTSRB) ------------------------------------
    sign_model_path: "" # absolute path to signs_best.pt (empty = disabled)
    sign_conf: 0.60 # lower to improve sign recall

    # -- Obstacle detection (YOLOv8n COCO) ---------------------------------
    obstacle_model_path: "" # absolute path to yolov8n.pt (empty = disabled)
    obstacle_conf: 0.40
    obstacle_roi_ratio: 1.0 # full image for obstacles
    lane_width_ratio: 0.50 # central width fraction = lane region

    # -- Publishing ---------------------------------------------------------
    publish_annotated: true
    process_rate: 20.0 # Hz — annotated publish/video rate (detection runs in its own thread)
